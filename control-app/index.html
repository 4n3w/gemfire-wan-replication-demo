<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GemFire WAN Replication Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #0f172a; color: #e2e8f0; padding: 24px; }
  h1 { font-size: 1.5rem; margin-bottom: 8px; }
  .subtitle { color: #94a3b8; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .card { background: #1e293b; border-radius: 8px; padding: 16px; border: 1px solid #334155; }
  .card h2 { font-size: 1rem; margin-bottom: 12px; color: #94a3b8; }
  .proxy-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #334155; }
  .proxy-row:last-child { border-bottom: none; }
  .proxy-name { font-weight: 600; }
  .proxy-detail { font-size: 0.85rem; color: #64748b; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; }
  .badge-green { background: #065f46; color: #6ee7b7; }
  .badge-red { background: #7f1d1d; color: #fca5a5; }
  .badge-yellow { background: #78350f; color: #fcd34d; }
  .badge-gray { background: #374151; color: #9ca3af; }
  .status-indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
  .status-green { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
  .status-red { background: #ef4444; box-shadow: 0 0 8px #ef444488; }
  .status-yellow { background: #eab308; box-shadow: 0 0 8px #eab30888; }
  .link-status { display: flex; align-items: center; font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; }
  .controls { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-red { background: #dc2626; color: white; }
  .btn-green { background: #16a34a; color: white; }
  .btn-yellow { background: #ca8a04; color: white; }
  .btn-blue { background: #2563eb; color: white; }
  .toxics-list { margin-top: 8px; }
  .toxic-item { font-size: 0.85rem; padding: 4px 8px; background: #7f1d1d44; border-radius: 4px; margin: 4px 0; color: #fca5a5; }
  .log { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 12px; max-height: 200px; overflow-y: auto; font-size: 0.8rem; font-family: monospace; margin-top: 8px; }
  .log-entry { padding: 2px 0; }
  .log-entry.error { color: #fca5a5; }
  .log-entry.success { color: #6ee7b7; }
  .log-entry.info { color: #93c5fd; }
</style>
</head>
<body>

<h1>GemFire WAN Replication Demo</h1>
<p class="subtitle">Site A &rarr; Site B replication via Toxiproxy-controlled WAN link</p>

<div class="link-status">
  <span id="link-indicator" class="status-indicator status-green"></span>
  <span id="link-text">WAN Link: Checking...</span>
</div>

<div class="grid">
  <div class="card">
    <h2>Proxy Status</h2>
    <div id="proxy-status">Loading...</div>
  </div>

  <div class="card">
    <h2>Active Toxics</h2>
    <div id="active-toxics">Loading...</div>
  </div>
</div>

<div class="card" style="margin-bottom: 24px;">
  <h2>Controls</h2>
  <div class="controls">
    <button class="btn btn-red" id="btn-kill" onclick="killLink()">Kill WAN Link</button>
    <button class="btn btn-green" id="btn-restore" onclick="restoreLink()">Restore WAN Link</button>
    <button class="btn btn-yellow" id="btn-latency" onclick="addLatency()">Add Latency (2s)</button>
    <button class="btn btn-blue" id="btn-rm-latency" onclick="removeLatency()">Remove Latency</button>
  </div>
</div>

<div class="card">
  <h2>Activity Log</h2>
  <div id="log" class="log"></div>
</div>

<script>
const PROXY_NAMES = ["wan_locator", "wan_receiver"];
const API = "/toxiproxy";

function log(msg, type = "info") {
  const el = document.getElementById("log");
  const entry = document.createElement("div");
  entry.className = "log-entry " + type;
  entry.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
  el.prepend(entry);
  // Keep log size manageable
  while (el.children.length > 100) el.removeChild(el.lastChild);
}

async function apiCall(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) {
    const text = await res.text();
    throw new Error(res.status + ": " + text);
  }
  if (res.status === 204) return null;
  return res.json();
}

let lastProxyData = null;

async function pollStatus() {
  try {
    const proxies = await apiCall("GET", "/proxies");
    lastProxyData = proxies;
    renderProxies(proxies);
    await pollToxics();
  } catch (e) {
    document.getElementById("proxy-status").textContent = "Error: " + e.message;
    setLinkStatus("red", "WAN Link: Unknown (API error)");
  }
}

function renderProxies(proxies) {
  const container = document.getElementById("proxy-status");
  container.innerHTML = "";
  for (const name of PROXY_NAMES) {
    const p = proxies[name];
    if (!p) {
      container.innerHTML += '<div class="proxy-row"><span class="proxy-name">' + name + '</span><span class="badge badge-gray">NOT FOUND</span></div>';
      continue;
    }
    const badge = p.enabled ? "badge-green" : "badge-red";
    const label = p.enabled ? "ENABLED" : "DISABLED";
    container.innerHTML +=
      '<div class="proxy-row">' +
        '<div><span class="proxy-name">' + name + '</span><br>' +
        '<span class="proxy-detail">' + p.listen + ' &rarr; ' + p.upstream + '</span></div>' +
        '<span class="badge ' + badge + '">' + label + '</span>' +
      '</div>';
  }
}

async function pollToxics() {
  const container = document.getElementById("active-toxics");
  container.innerHTML = "";
  let totalToxics = 0;
  let hasLatency = false;

  // Check if any proxy is disabled
  let anyDisabled = false;
  if (lastProxyData) {
    for (const name of PROXY_NAMES) {
      const p = lastProxyData[name];
      if (p && !p.enabled) anyDisabled = true;
    }
  }

  for (const name of PROXY_NAMES) {
    try {
      const toxics = await apiCall("GET", "/proxies/" + name + "/toxics");
      if (toxics && toxics.length > 0) {
        totalToxics += toxics.length;
        for (const t of toxics) {
          if (t.type === "latency") hasLatency = true;
          container.innerHTML +=
            '<div class="toxic-item">' + name + ': ' + t.name + ' (' + t.type + ') — ' + JSON.stringify(t.attributes) + '</div>';
        }
      }
    } catch (e) {
      container.innerHTML += '<div class="toxic-item">Error fetching toxics for ' + name + '</div>';
    }
  }

  if (totalToxics === 0 && !anyDisabled) {
    container.innerHTML = '<div style="color:#6ee7b7;">No active toxics — link is clean</div>';
  } else if (totalToxics === 0 && anyDisabled) {
    container.innerHTML = '<div style="color:#fca5a5;">No toxics, but proxy is disabled</div>';
  }

  // Update link status — proxy disabled takes priority
  if (anyDisabled) {
    setLinkStatus("red", "WAN Link: DOWN (proxy disabled)");
  } else if (hasLatency) {
    setLinkStatus("yellow", "WAN Link: DEGRADED (latency toxic active)");
  } else {
    setLinkStatus("green", "WAN Link: HEALTHY");
  }
}

function setLinkStatus(color, text) {
  const indicator = document.getElementById("link-indicator");
  const label = document.getElementById("link-text");
  indicator.className = "status-indicator status-" + color;
  label.textContent = text;
}

function setButtonsDisabled(disabled) {
  document.querySelectorAll(".btn").forEach(b => b.disabled = disabled);
}

async function killLink() {
  setButtonsDisabled(true);
  log("Killing WAN link...", "error");
  try {
    for (const name of PROXY_NAMES) {
      await apiCall("POST", "/proxies/" + name, { enabled: false });
    }
    log("WAN link killed — both proxies disabled", "error");
  } catch (e) {
    log("Error killing link: " + e.message, "error");
  }
  setButtonsDisabled(false);
  pollStatus();
}

async function restoreLink() {
  setButtonsDisabled(true);
  log("Restoring WAN link...", "success");
  try {
    for (const name of PROXY_NAMES) {
      await apiCall("POST", "/proxies/" + name, { enabled: true });
    }
    log("WAN link restored — both proxies enabled", "success");
  } catch (e) {
    log("Error restoring link: " + e.message, "error");
  }
  setButtonsDisabled(false);
  pollStatus();
}

async function addLatency() {
  setButtonsDisabled(true);
  log("Adding 2s latency...", "info");
  try {
    for (const name of PROXY_NAMES) {
      await apiCall("POST", "/proxies/" + name + "/toxics", {
        name: "latency_" + name,
        type: "latency",
        attributes: { latency: 2000, jitter: 500 }
      });
    }
    log("Latency toxic added (2000ms +/- 500ms jitter)", "info");
  } catch (e) {
    log("Error adding latency: " + e.message, "error");
  }
  setButtonsDisabled(false);
  pollStatus();
}

async function removeLatency() {
  setButtonsDisabled(true);
  log("Removing latency...", "success");
  try {
    for (const name of PROXY_NAMES) {
      try {
        await apiCall("DELETE", "/proxies/" + name + "/toxics/latency_" + name);
      } catch (e) { /* toxic may not exist */ }
    }
    log("Latency toxics removed", "success");
  } catch (e) {
    log("Error removing latency: " + e.message, "error");
  }
  setButtonsDisabled(false);
  pollStatus();
}

// Poll every 3 seconds
pollStatus();
setInterval(pollStatus, 3000);
</script>

</body>
</html>
