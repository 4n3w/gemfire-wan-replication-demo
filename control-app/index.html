<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GemFire WAN Replication Demo</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @keyframes flowRight {
    from { stroke-dashoffset: 12; }
    to { stroke-dashoffset: 0; }
  }
  @keyframes pulseGlow {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes pulseDot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.5; }
  }
  .dot-pulse { animation: pulseDot 1.5s ease-in-out infinite; }
</style>
</head>
<body class="bg-slate-900 min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = "/toxiproxy";
const PROXY_NAMES = ["wan_locator", "wan_receiver"];

async function apiCall(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
  if (res.status === 204) return null;
  return res.json();
}

/* ── Icons ─────────────────────────────────────────────── */

function LocatorIcon(props) {
  return (
    <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
      <circle cx="12" cy="10" r="3" />
    </svg>
  );
}

function ServerIcon(props) {
  return (
    <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <rect x="2" y="2" width="20" height="8" rx="2" />
      <rect x="2" y="14" width="20" height="8" rx="2" />
      <line x1="6" y1="6" x2="6.01" y2="6" strokeWidth="2" />
      <line x1="6" y1="18" x2="6.01" y2="18" strokeWidth="2" />
    </svg>
  );
}

function NetworkIcon(props) {
  return (
    <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <rect x="9" y="2" width="6" height="6" rx="1" />
      <rect x="2" y="16" width="6" height="6" rx="1" />
      <rect x="16" y="16" width="6" height="6" rx="1" />
      <path d="M12 8v4m0 0l-7 4m7-4l7 4" />
    </svg>
  );
}

/* ── Animated Connection Arrow ─────────────────────────── */

function WanArrow({ status, id }) {
  const isDown = status === "down";
  const isDegraded = status === "degraded";
  const isHealthy = status === "healthy";

  const color = isDown ? "#ef4444"
    : isDegraded ? "#eab308"
    : isHealthy ? "#22c55e"
    : "#475569";

  const speed = isDown ? 0 : isDegraded ? 2.5 : 0.5;
  const markerId = "ah-" + id;

  return (
    <div className="flex flex-col items-center justify-center shrink-0 px-1">
      <svg width="90" height="28" style={{ overflow: "visible" }}>
        <defs>
          <marker id={markerId} viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="5" markerHeight="5" orient="auto">
            <path d="M0 0 L10 5 L0 10z" fill={color} />
          </marker>
        </defs>
        <line x1="2" y1="14" x2="80" y2="14"
          stroke={color} strokeWidth="2.5" strokeLinecap="round"
          strokeDasharray={isDown ? "3 7" : "6 6"}
          markerEnd={"url(#" + markerId + ")"}
          style={speed ? { animation: "flowRight " + speed + "s linear infinite" } : undefined}
        />
        {isDown && (
          <g>
            <line x1="38" y1="6" x2="52" y2="22" stroke="#ef4444" strokeWidth="2.5" strokeLinecap="round" />
            <line x1="52" y1="6" x2="38" y2="22" stroke="#ef4444" strokeWidth="2.5" strokeLinecap="round" />
          </g>
        )}
      </svg>
      <span className="text-slate-600 mt-0.5" style={{ fontSize: "9px", letterSpacing: "0.05em" }}>
        {isDown ? "DISCONNECTED" : isDegraded ? "DEGRADED" : isHealthy ? "REPLICATING" : ""}
      </span>
    </div>
  );
}

/* ── Node Card ─────────────────────────────────────────── */

function NodeCard({ icon, name, sub, detail, status }) {
  const Icon = icon === "locator" ? LocatorIcon
    : icon === "server" ? ServerIcon
    : NetworkIcon;

  const borderColor = status === "healthy" ? "rgba(16,185,129,0.4)"
    : status === "down" ? "rgba(239,68,68,0.4)"
    : status === "degraded" ? "rgba(234,179,8,0.4)"
    : "rgba(71,85,105,0.5)";

  const glowColor = status === "healthy" ? "0 0 20px rgba(16,185,129,0.12)"
    : status === "down" ? "0 0 20px rgba(239,68,68,0.12)"
    : status === "degraded" ? "0 0 20px rgba(234,179,8,0.12)"
    : "none";

  const dotColor = status === "healthy" ? "#22c55e"
    : status === "down" ? "#ef4444"
    : status === "degraded" ? "#eab308"
    : "#64748b";

  return (
    <div className="bg-slate-800 rounded-lg px-3 py-2.5"
      style={{ border: "1px solid " + borderColor, boxShadow: glowColor,
               transition: "all 0.5s ease", minWidth: "140px" }}>
      <div className="flex items-center gap-2">
        <span className={status === "down" ? "dot-pulse" : ""}
          style={{ width: 7, height: 7, borderRadius: "50%", backgroundColor: dotColor,
                   display: "inline-block", flexShrink: 0 }} />
        <Icon className="shrink-0" style={{ width: 15, height: 15, color: "#94a3b8" }} />
        <span className="text-sm font-semibold text-slate-200" style={{ whiteSpace: "nowrap" }}>
          {name}
        </span>
      </div>
      {sub && <div className="text-xs text-slate-400 mt-0.5" style={{ paddingLeft: 24 }}>{sub}</div>}
      {detail && <div className="text-slate-500 mt-0.5" style={{ fontSize: 10, paddingLeft: 24 }}>{detail}</div>}
    </div>
  );
}

/* ── Site Cluster ──────────────────────────────────────── */

function SiteCluster({ site, children }) {
  var isA = site === "A";
  var borderColor = isA ? "rgba(56,189,248,0.2)" : "rgba(139,92,246,0.2)";
  var bgColor = isA ? "rgba(12,74,110,0.12)" : "rgba(76,29,149,0.12)";
  var labelColor = isA ? "#38bdf8" : "#a78bfa";

  return (
    <div className="rounded-xl p-4"
      style={{ border: "1px solid " + borderColor, background: bgColor }}>
      <div className="text-center mb-3" style={{ fontSize: 11, fontWeight: 700,
           color: labelColor, textTransform: "uppercase", letterSpacing: "0.1em" }}>
        {"Site " + site}
        <span className="font-normal" style={{ color: "#64748b",
              textTransform: "none", letterSpacing: "normal", marginLeft: 6, fontSize: 10 }}>
          {"DS-ID: " + (isA ? "1" : "2")}
        </span>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {children}
      </div>
    </div>
  );
}

/* ── Status Badge ──────────────────────────────────────── */

function StatusBadge({ status }) {
  var cfg = status === "healthy"
    ? { bg: "rgba(6,78,59,0.5)", text: "#6ee7b7", border: "rgba(6,95,70,0.8)", label: "HEALTHY" }
    : status === "down"
    ? { bg: "rgba(127,29,29,0.5)", text: "#fca5a5", border: "rgba(153,27,27,0.8)", label: "DOWN" }
    : status === "degraded"
    ? { bg: "rgba(120,53,15,0.5)", text: "#fcd34d", border: "rgba(146,64,14,0.8)", label: "DEGRADED" }
    : { bg: "rgba(30,41,59,0.8)", text: "#94a3b8", border: "rgba(51,65,85,0.8)", label: "CHECKING..." };

  var dotColor = status === "healthy" ? "#22c55e"
    : status === "down" ? "#ef4444"
    : status === "degraded" ? "#eab308" : "#94a3b8";

  return (
    <span className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold"
      style={{ background: cfg.bg, color: cfg.text, border: "1px solid " + cfg.border }}>
      <span className={status === "down" ? "dot-pulse" : ""}
        style={{ width: 8, height: 8, borderRadius: "50%", backgroundColor: dotColor, display: "inline-block" }} />
      {"WAN Link: " + cfg.label}
    </span>
  );
}

/* ── Control Button ────────────────────────────────────── */

function Btn({ onClick, disabled, color, children }) {
  var bg = color === "red" ? "#dc2626"
    : color === "green" ? "#16a34a"
    : color === "yellow" ? "#ca8a04"
    : color === "orange" ? "#ea580c"
    : "#2563eb";
  var hoverBg = color === "red" ? "#b91c1c"
    : color === "green" ? "#15803d"
    : color === "yellow" ? "#a16207"
    : color === "orange" ? "#c2410c"
    : "#1d4ed8";

  return (
    <button onClick={onClick} disabled={disabled}
      className="text-white px-5 py-2.5 rounded-lg text-sm font-semibold transition-all"
      style={{ background: bg, opacity: disabled ? 0.3 : 1,
               cursor: disabled ? "not-allowed" : "pointer" }}
      onMouseOver={function(e) { if (!disabled) e.currentTarget.style.background = hoverBg; }}
      onMouseOut={function(e) { e.currentTarget.style.background = bg; }}>
      {children}
    </button>
  );
}

/* ── Main App ──────────────────────────────────────────── */

function App() {
  var _s = useState("unknown");   var wanStatus = _s[0]; var setWanStatus = _s[1];
  var _p = useState(null);        var proxyData = _p[0]; var setProxyData = _p[1];
  var _t = useState({});           var toxicsData = _t[0]; var setToxicsData = _t[1];
  var _l = useState([]);           var logs = _l[0]; var setLogs = _l[1];
  var _b = useState(false);        var busy = _b[0]; var setBusy = _b[1];
  var _g = useState(null);         var genStatus = _g[0]; var setGenStatus = _g[1];

  var addLog = useCallback(function(msg, type) {
    type = type || "info";
    setLogs(function(prev) {
      return [{ time: new Date().toLocaleTimeString(), msg: msg, type: type,
                id: Date.now() + Math.random() }].concat(prev).slice(0, 80);
    });
  }, []);

  var pollStatus = useCallback(function() {
    apiCall("GET", "/proxies").then(function(proxies) {
      setProxyData(proxies);
      var anyDisabled = false;
      var hasToxic = false;
      var toxics = {};
      var promises = PROXY_NAMES.map(function(name) {
        var p = proxies[name];
        if (p && !p.enabled) anyDisabled = true;
        return apiCall("GET", "/proxies/" + name + "/toxics").then(function(t) {
          toxics[name] = t || [];
          if (t && t.length > 0) hasToxic = true;
        }).catch(function() { toxics[name] = []; });
      });
      Promise.all(promises).then(function() {
        setToxicsData(toxics);
        if (anyDisabled) setWanStatus("down");
        else if (hasToxic) setWanStatus("degraded");
        else setWanStatus("healthy");
      });
    }).catch(function() {
      setWanStatus("unknown");
    });
  }, []);

  var pollGenStatus = useCallback(function() {
    fetch("/data-gen/status").then(function(r) { return r.json(); })
      .then(function(d) { setGenStatus(d); })
      .catch(function() { setGenStatus(null); });
  }, []);

  useEffect(function() {
    pollStatus();
    pollGenStatus();
    var interval = setInterval(function() { pollStatus(); pollGenStatus(); }, 3000);
    return function() { clearInterval(interval); };
  }, [pollStatus, pollGenStatus]);

  function doAction(action) {
    setBusy(true);
    action().catch(function(e) {
      addLog("Error: " + e.message, "error");
    }).finally(function() {
      setBusy(false);
      pollStatus();
    });
  }

  function killLink() {
    doAction(function() {
      addLog("Killing WAN link...", "error");
      return Promise.all(PROXY_NAMES.map(function(name) {
        return apiCall("POST", "/proxies/" + name, { enabled: false });
      })).then(function() {
        addLog("WAN link killed \u2014 both proxies disabled", "error");
      });
    });
  }

  function restoreLink() {
    doAction(function() {
      addLog("Restoring WAN link...", "success");
      return Promise.all(PROXY_NAMES.map(function(name) {
        return apiCall("POST", "/proxies/" + name, { enabled: true });
      })).then(function() {
        addLog("WAN link restored \u2014 both proxies enabled", "success");
      });
    });
  }

  function addLatencyAction(ms) {
    var jitter = Math.round(ms * 0.25);
    doAction(function() {
      addLog("Setting latency to " + (ms / 1000) + "s...", "info");
      /* Remove any existing latency toxic first, then add the new one */
      return Promise.all(PROXY_NAMES.map(function(name) {
        return apiCall("DELETE", "/proxies/" + name + "/toxics/latency_" + name).catch(function() {});
      })).then(function() {
        return Promise.all(PROXY_NAMES.map(function(name) {
          return apiCall("POST", "/proxies/" + name + "/toxics", {
            name: "latency_" + name, type: "latency",
            attributes: { latency: ms, jitter: jitter }
          });
        }));
      }).then(function() {
        addLog("Latency set (" + ms + "ms \u00b1 " + jitter + "ms jitter)", "info");
      });
    });
  }

  function removeLatencyAction() {
    doAction(function() {
      addLog("Removing latency...", "success");
      return Promise.all(PROXY_NAMES.map(function(name) {
        return apiCall("DELETE", "/proxies/" + name + "/toxics/latency_" + name).catch(function() {});
      })).then(function() {
        addLog("Latency removed", "success");
      });
    });
  }

  function addBandwidthAction(kbps) {
    doAction(function() {
      addLog("Throttling to " + kbps + " KB/s...", "info");
      /* Remove existing bandwidth toxic first, then add new one */
      return Promise.all(PROXY_NAMES.map(function(name) {
        return apiCall("DELETE", "/proxies/" + name + "/toxics/bw_" + name).catch(function() {});
      })).then(function() {
        return Promise.all(PROXY_NAMES.map(function(name) {
          return apiCall("POST", "/proxies/" + name + "/toxics", {
            name: "bw_" + name, type: "bandwidth",
            attributes: { rate: kbps }
          });
        }));
      }).then(function() {
        addLog("Bandwidth limited to " + kbps + " KB/s", "info");
      });
    });
  }

  function removeBandwidthAction() {
    doAction(function() {
      addLog("Removing bandwidth limit...", "success");
      return Promise.all(PROXY_NAMES.map(function(name) {
        return apiCall("DELETE", "/proxies/" + name + "/toxics/bw_" + name).catch(function() {});
      })).then(function() {
        addLog("Bandwidth limit removed", "success");
      });
    });
  }

  function genAction(endpoint) {
    fetch("/data-gen/" + endpoint).then(function(r) { return r.json(); })
      .then(function(d) { setGenStatus(d); pollGenStatus(); })
      .catch(function(e) { addLog("Data gen error: " + e.message, "error"); });
  }

  function setGenRate(ms) {
    var label = ms >= 1000 ? (ms / 1000) + "/sec" : Math.round(1000 / ms) + "/sec";
    addLog("Data generator rate: " + label, "info");
    fetch("/data-gen/rate?ms=" + ms).then(function(r) { return r.json(); })
      .then(function(d) { setGenStatus(d); pollGenStatus(); })
      .catch(function(e) { addLog("Data gen error: " + e.message, "error"); });
  }

  /* Determine node statuses */
  var proxyNodeStatus = wanStatus === "unknown" ? "neutral" : wanStatus;

  /* Compute all toxics for display */
  var allToxics = [];
  var toxicTypes = {};
  Object.keys(toxicsData).forEach(function(proxy) {
    (toxicsData[proxy] || []).forEach(function(t) {
      allToxics.push({ proxy: proxy, name: t.name, type: t.type, attributes: t.attributes });
      toxicTypes[t.type] = true;
    });
  });

  /* Build toxiproxy detail label */
  var toxicDetail = wanStatus === "down" ? "DISABLED" : "PASS-THROUGH";
  if (wanStatus !== "down" && allToxics.length > 0) {
    var parts = [];
    if (toxicTypes.latency) parts.push("LATENCY");
    if (toxicTypes.bandwidth) parts.push("THROTTLED");
    Object.keys(toxicTypes).forEach(function(t) {
      if (t !== "latency" && t !== "bandwidth") parts.push(t.toUpperCase());
    });
    toxicDetail = parts.join(" + ");
  }

  return (
    <div className="max-w-5xl mx-auto px-4 py-6 text-slate-200">

      {/* Header */}
      <div className="flex items-start justify-between mb-6 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold text-white">GemFire WAN Replication</h1>
          <p className="text-sm text-slate-400 mt-1">
            Site A &rarr; Site B replication via Toxiproxy-controlled WAN link
          </p>
        </div>
        <StatusBadge status={wanStatus} />
      </div>

      {/* Topology Diagram */}
      <div className="rounded-2xl p-6 mb-6 overflow-x-auto"
        style={{ background: "rgba(30,41,59,0.4)", border: "1px solid rgba(51,65,85,0.6)" }}>
        <div className="flex items-center justify-center gap-3" style={{ minWidth: 700 }}>

          {/* Site A */}
          <SiteCluster site="A">
            <NodeCard icon="locator" name="Locator" sub="site-a-locator" detail="Port 10335" status="healthy" />
            <NodeCard icon="server" name="Server" sub="site-a-server" detail="Gateway Sender" status="healthy" />
          </SiteCluster>

          {/* Arrow: Site A -> Toxiproxy */}
          <WanArrow status={wanStatus === "unknown" ? "neutral" : wanStatus} id="a-to-toxi" />

          {/* Toxiproxy */}
          <NodeCard icon="network" name="Toxiproxy" sub="WAN Proxy"
            detail={toxicDetail}
            status={proxyNodeStatus} />

          {/* Arrow: Toxiproxy -> Site B */}
          <WanArrow status={wanStatus === "unknown" ? "neutral" : wanStatus} id="toxi-to-b" />

          {/* Site B */}
          <SiteCluster site="B">
            <NodeCard icon="server" name="Server" sub="site-b-server" detail="Gateway Receiver"
              status={wanStatus === "down" ? "down" : "healthy"} />
            <NodeCard icon="locator" name="Locator" sub="site-b-locator" detail="Port 10335"
              status={wanStatus === "down" ? "neutral" : "healthy"} />
          </SiteCluster>
        </div>
      </div>

      {/* Controls */}
      <div className="rounded-xl p-4 mb-6"
        style={{ background: "rgba(30,41,59,0.4)", border: "1px solid rgba(51,65,85,0.6)" }}>
        <div className="text-xs font-bold uppercase tracking-wider mb-4" style={{ color: "#64748b" }}>
          Controls
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div>
            <div className="text-xs mb-2" style={{ color: "#475569" }}>WAN Link</div>
            <div className="flex gap-2 flex-wrap">
              <Btn onClick={killLink} disabled={busy} color="red">Kill Link</Btn>
              <Btn onClick={restoreLink} disabled={busy} color="green">Restore Link</Btn>
            </div>
          </div>
          <div>
            <div className="text-xs mb-2" style={{ color: "#475569" }}>Network Impairments</div>
            <div className="flex gap-2 flex-wrap items-center">
              <span className="text-xs" style={{ color: "#64748b" }}>Latency:</span>
              <Btn onClick={function() { addLatencyAction(2000); }} disabled={busy} color="yellow">2s</Btn>
              <Btn onClick={function() { addLatencyAction(5000); }} disabled={busy} color="yellow">5s</Btn>
              <Btn onClick={function() { addLatencyAction(10000); }} disabled={busy} color="yellow">10s</Btn>
              <Btn onClick={function() { addLatencyAction(30000); }} disabled={busy} color="yellow">30s</Btn>
              <Btn onClick={removeLatencyAction} disabled={busy} color="blue">Remove</Btn>
              <span style={{ width: 1, height: 28, background: "rgba(51,65,85,0.6)", margin: "0 4px" }} />
              <span className="text-xs" style={{ color: "#64748b" }}>Throttle:</span>
              <Btn onClick={function() { addBandwidthAction(100); }} disabled={busy} color="orange">100 KB/s</Btn>
              <Btn onClick={function() { addBandwidthAction(10); }} disabled={busy} color="orange">10 KB/s</Btn>
              <Btn onClick={function() { addBandwidthAction(1); }} disabled={busy} color="orange">1 KB/s</Btn>
              <Btn onClick={removeBandwidthAction} disabled={busy} color="blue">Remove</Btn>
            </div>
          </div>
        </div>
      </div>

      {/* Data Generator */}
      <div className="rounded-xl p-4 mb-6"
        style={{ background: "rgba(30,41,59,0.4)", border: "1px solid rgba(51,65,85,0.6)" }}>
        <div className="flex items-center justify-between mb-3">
          <div className="text-xs font-bold uppercase tracking-wider" style={{ color: "#64748b" }}>
            Data Generator
          </div>
          {genStatus && (
            <div className="flex items-center gap-3">
              <span className="text-xs font-mono" style={{ color: "#94a3b8" }}>
                {genStatus.counter + " entries"}
              </span>
              <span className="text-xs px-2 py-0.5 rounded-full font-semibold"
                style={genStatus.running
                  ? { background: "rgba(6,78,59,0.4)", color: "#6ee7b7", border: "1px solid rgba(6,95,70,0.6)" }
                  : { background: "rgba(127,29,29,0.4)", color: "#fca5a5", border: "1px solid rgba(153,27,27,0.6)" }}>
                {genStatus.running ? "RUNNING" : "STOPPED"}
              </span>
            </div>
          )}
        </div>
        <div className="flex gap-2 flex-wrap items-center">
          <Btn onClick={function() { genAction("start"); addLog("Data generator started", "success"); }}
            disabled={genStatus && genStatus.running} color="green">Start</Btn>
          <Btn onClick={function() { genAction("stop"); addLog("Data generator stopped", "error"); }}
            disabled={!genStatus || !genStatus.running} color="red">Stop</Btn>
          <span style={{ width: 1, height: 28, background: "rgba(51,65,85,0.6)", margin: "0 4px" }} />
          <span className="text-xs" style={{ color: "#64748b" }}>Rate:</span>
          <Btn onClick={function() { setGenRate(1000); }} color="blue">1/sec</Btn>
          <Btn onClick={function() { setGenRate(200); }} color="blue">5/sec</Btn>
          <Btn onClick={function() { setGenRate(100); }} color="blue">10/sec</Btn>
          <Btn onClick={function() { setGenRate(67); }} color="blue">15/sec</Btn>
          <Btn onClick={function() { setGenRate(50); }} color="blue">20/sec</Btn>
          <Btn onClick={function() { setGenRate(20); }} color="blue">50/sec</Btn>
        </div>
      </div>

      {/* Details Grid */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">

        {/* Proxy Details */}
        <div className="rounded-xl p-4"
          style={{ background: "rgba(30,41,59,0.4)", border: "1px solid rgba(51,65,85,0.6)" }}>
          <div className="text-xs font-bold uppercase tracking-wider mb-3" style={{ color: "#64748b" }}>
            Proxy Status
          </div>
          {proxyData ? PROXY_NAMES.map(function(name) {
            var p = proxyData[name];
            if (!p) return (
              <div key={name} className="flex justify-between items-center py-2"
                style={{ borderBottom: "1px solid rgba(51,65,85,0.4)" }}>
                <span className="text-sm font-mono">{name}</span>
                <span className="text-xs px-2 py-0.5 rounded"
                  style={{ background: "#374151", color: "#9ca3af" }}>NOT FOUND</span>
              </div>
            );
            return (
              <div key={name} className="flex justify-between items-center py-2"
                style={{ borderBottom: "1px solid rgba(51,65,85,0.4)" }}>
                <div>
                  <span className="text-sm font-mono font-semibold">{name}</span>
                  <div className="text-xs" style={{ color: "#64748b" }}>
                    {p.listen + " \u2192 " + p.upstream}
                  </div>
                </div>
                <span className="text-xs px-2.5 py-0.5 rounded-full font-semibold"
                  style={p.enabled
                    ? { background: "rgba(6,78,59,0.4)", color: "#6ee7b7", border: "1px solid rgba(6,95,70,0.6)" }
                    : { background: "rgba(127,29,29,0.4)", color: "#fca5a5", border: "1px solid rgba(153,27,27,0.6)" }}>
                  {p.enabled ? "ENABLED" : "DISABLED"}
                </span>
              </div>
            );
          }) : <div className="text-sm" style={{ color: "#64748b" }}>Loading...</div>}
        </div>

        {/* Active Toxics */}
        <div className="rounded-xl p-4"
          style={{ background: "rgba(30,41,59,0.4)", border: "1px solid rgba(51,65,85,0.6)" }}>
          <div className="text-xs font-bold uppercase tracking-wider mb-3" style={{ color: "#64748b" }}>
            Active Toxics
          </div>
          {allToxics.length > 0 ? allToxics.map(function(t, i) {
            return (
              <div key={i} className="text-xs font-mono rounded px-3 py-2 mb-2"
                style={{ background: "rgba(127,29,29,0.15)", border: "1px solid rgba(153,27,27,0.25)" }}>
                <span style={{ color: "#fca5a5" }}>{t.proxy}</span>
                <span style={{ color: "#64748b" }}>{" \u2192 "}</span>
                <span style={{ color: "#fcd34d" }}>{t.name}</span>
                <span style={{ color: "#64748b" }}>{" (" + t.type + ")"}</span>
                <div style={{ color: "#94a3b8", marginTop: 4 }}>{JSON.stringify(t.attributes)}</div>
              </div>
            );
          }) : (
            <div className="text-sm" style={{ color: wanStatus === "down" ? "#fca5a5" : "#6ee7b7", opacity: 0.7 }}>
              {wanStatus === "down" ? "No toxics \u2014 proxy is disabled" : "No active toxics \u2014 link is clean"}
            </div>
          )}
        </div>
      </div>

      {/* Activity Log */}
      <div className="rounded-xl p-4"
        style={{ background: "rgba(30,41,59,0.4)", border: "1px solid rgba(51,65,85,0.6)" }}>
        <div className="text-xs font-bold uppercase tracking-wider mb-3" style={{ color: "#64748b" }}>
          Activity Log
        </div>
        <div className="font-mono text-xs overflow-y-auto" style={{ maxHeight: 180 }}>
          {logs.length === 0 ? (
            <div style={{ color: "#64748b" }}>No activity yet</div>
          ) : logs.map(function(entry) {
            var c = entry.type === "error" ? "#fca5a5"
              : entry.type === "success" ? "#6ee7b7" : "#93c5fd";
            return (
              <div key={entry.id} style={{ color: c, padding: "2px 0" }}>
                <span style={{ color: "#64748b" }}>{"[" + entry.time + "]"}</span>{" " + entry.msg}
              </div>
            );
          })}
        </div>
      </div>

      {/* Footer */}
      <div className="text-center text-xs mt-6" style={{ color: "#475569" }}>
        <a href="http://localhost:3000" target="_blank" className="hover:underline"
          style={{ color: "#38bdf8" }}>Grafana Dashboard</a>
        <span className="mx-2">&middot;</span>
        <a href="http://localhost:9090" target="_blank" className="hover:underline"
          style={{ color: "#38bdf8" }}>Prometheus</a>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
