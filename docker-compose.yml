services:

  # ── Site A Locator ──────────────────────────────────────────────
  site-a-locator:
    image: gemfire/gemfire:10.2.1-jdk17
    container_name: site-a-locator
    hostname: site-a-locator
    networks:
      - site-a-net
    volumes:
      - ./scripts/start-locator.sh:/scripts/start-locator.sh:ro
    entrypoint: ["bash", "/scripts/start-locator.sh"]
    environment:
      LOCATOR_NAME: site-a-locator
      LOCATOR_PORT: "10335"
      SITE_ID: "1"
      REMOTE_LOCATORS: "toxiproxy[10335]"
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'Locator started' /data/site-a-locator/site-a-locator.log"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  # ── Site B Locator ──────────────────────────────────────────────
  site-b-locator:
    image: gemfire/gemfire:10.2.1-jdk17
    container_name: site-b-locator
    hostname: site-b-locator
    networks:
      - site-b-net
    volumes:
      - ./scripts/start-locator.sh:/scripts/start-locator.sh:ro
    entrypoint: ["bash", "/scripts/start-locator.sh"]
    environment:
      LOCATOR_NAME: site-b-locator
      LOCATOR_PORT: "10335"
      SITE_ID: "2"
      HOSTNAME_FOR_CLIENTS: "toxiproxy"
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'Locator started' /data/site-b-locator/site-b-locator.log"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  # ── Toxiproxy (bridges both networks) ──────────────────────────
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: toxiproxy
    hostname: toxiproxy
    networks:
      - site-a-net
      - site-b-net
    ports:
      - "8474:8474"
    volumes:
      - ./config/toxiproxy.json:/config/toxiproxy.json:ro
    command: ["-host=0.0.0.0", "-config=/config/toxiproxy.json", "-proxy-metrics", "-runtime-metrics"]
    depends_on:
      site-a-locator:
        condition: service_healthy
      site-b-locator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/toxiproxy-cli", "list"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── Site A Server ───────────────────────────────────────────────
  site-a-server:
    image: gemfire/gemfire:10.2.1-jdk17
    container_name: site-a-server
    hostname: site-a-server
    networks:
      - site-a-net
    ports:
      - "18080:8080"   # GemFire REST / built-in metrics (debug)
    volumes:
      - ./scripts/start-server.sh:/scripts/start-server.sh:ro
      - ./config/site-a-cache.xml:/config/cache.xml:ro
    entrypoint: ["bash", "/scripts/start-server.sh"]
    environment:
      SERVER_NAME: site-a-server
      LOCATOR_HOST: site-a-locator
      LOCATOR_PORT: "10335"
      SITE_ID: "1"
      CACHE_XML: /config/cache.xml
      HTTP_PORT: "8080"
    depends_on:
      site-a-locator:
        condition: service_healthy
      toxiproxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'startup completed' /data/site-a-server/site-a-server.log"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  # ── Site B Server ───────────────────────────────────────────────
  site-b-server:
    image: gemfire/gemfire:10.2.1-jdk17
    container_name: site-b-server
    hostname: site-b-server
    networks:
      - site-b-net
    ports:
      - "28080:8080"   # GemFire REST / built-in metrics (debug)
    volumes:
      - ./scripts/start-server.sh:/scripts/start-server.sh:ro
      - ./config/site-b-cache.xml:/config/cache.xml:ro
    entrypoint: ["bash", "/scripts/start-server.sh"]
    environment:
      SERVER_NAME: site-b-server
      LOCATOR_HOST: site-b-locator
      LOCATOR_PORT: "10335"
      SITE_ID: "2"
      CACHE_XML: /config/cache.xml
      HTTP_PORT: "8080"
    depends_on:
      site-b-locator:
        condition: service_healthy
      toxiproxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'startup completed' /data/site-b-server/site-b-server.log"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  # ── Control App (browser UI) ────────────────────────────────────
  control-app:
    image: nginx:alpine
    container_name: control-app
    hostname: control-app
    networks:
      - site-a-net
    ports:
      - "8080:80"
    volumes:
      - ./control-app/index.html:/usr/share/nginx/html/index.html:ro
      - ./control-app/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      toxiproxy:
        condition: service_healthy

  # ── Data Generator ──────────────────────────────────────────────
  data-generator:
    image: gemfire/gemfire:10.2.1-jdk17
    container_name: data-generator
    hostname: data-generator
    networks:
      - site-a-net
    volumes:
      - ./scripts/data-generator.sh:/scripts/data-generator.sh:ro
      - ./scripts/DataGenerator.java:/scripts/DataGenerator.java:ro
    entrypoint: ["bash", "/scripts/data-generator.sh"]
    environment:
      LOCATOR_HOST: site-a-locator
      LOCATOR_PORT: "10335"
      HTTP_PORT: "8888"
      AUTO_START: "true"
    depends_on:
      site-a-server:
        condition: service_healthy

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    hostname: prometheus
    networks:
      - site-a-net
      - site-b-net
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      site-a-server:
        condition: service_healthy
      site-b-server:
        condition: service_healthy

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    hostname: grafana
    networks:
      - site-a-net
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/wan-replication.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

networks:
  site-a-net:
    driver: bridge
  site-b-net:
    driver: bridge
